<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXB Console Hub</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; font-family: "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
        .app-shell { display: flex; flex-direction: column; height: 100%; }
        .shell-header {
            height: 68px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            border-bottom: 1px solid #334155;
            gap: 14px;
        }
        .brand { font-size: 18px; color: #93c5fd; font-weight: 600; }
        .sub { font-size: 12px; color: #94a3b8; margin-left: 10px; }
        .left { display: flex; align-items: baseline; }
        .top-nav { display: flex; gap: 8px; }
        .top-nav button {
            border: 1px solid #334155;
            background: #0b1220;
            color: #cbd5e1;
            border-radius: 8px;
            padding: 6px 11px;
            font-size: 12px;
            cursor: pointer;
        }
        .top-nav button:hover { border-color: #475569; color: #e2e8f0; }
        .top-nav button.active { color: #93c5fd; border-color: #3b82f6; background: #172554; }
        .right { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .ghost-btn {
            border: 1px solid #334155;
            background: #0b1220;
            color: #cbd5e1;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .ghost-btn:hover { color: #e2e8f0; border-color: #475569; }
        .global-conn { display: flex; align-items: center; gap: 6px; }
        .global-conn input {
            width: 130px;
            border: 1px solid #334155;
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
        }
        .global-conn input.port { width: 86px; }
        .global-conn select {
            width: 240px;
            border: 1px solid #334155;
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
        }
        .global-conn button {
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .global-conn button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
        .global-conn button:disabled { opacity: 0.55; cursor: not-allowed; }
        .conn-pill {
            border: 1px solid #334155;
            background: #0b1220;
            color: #94a3b8;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            white-space: nowrap;
        }
        .shell-content { flex: 1; min-height: 0; }
        .conn-panel-mask {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.55);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 20;
        }
        .conn-panel-mask.show {
            opacity: 1;
            pointer-events: auto;
        }
        .conn-panel {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 390px;
            max-width: 92vw;
            transform: translateX(100%);
            transition: transform 0.22s ease;
            background: #0b1220;
            border-left: 1px solid #334155;
            z-index: 21;
            display: flex;
            flex-direction: column;
        }
        .conn-panel.show { transform: translateX(0); }
        .conn-panel-head {
            height: 60px;
            padding: 0 12px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .conn-panel-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: auto;
        }
        #page-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #0f172a;
        }
    </style>
</head>
<body>
<div class="app-shell">
    <header class="shell-header">
        <div class="left">
            <div class="brand">LXB Console Hub</div>
            <div class="sub" id="page-title">Command Studio</div>
        </div>
        <nav class="top-nav" id="top-nav">
            <button data-page="command_studio" class="active">Command Studio</button>
            <button data-page="map_builder">Map Builder</button>
            <button data-page="map_viewer">Map Viewer</button>
            <button data-page="cortex_route">Cortex Route</button>
        </nav>
        <div class="right">
            <div class="conn-pill" id="global-conn-status">未连接</div>
            <button class="ghost-btn" id="global-conn-manage">连接管理</button>
        </div>
    </header>
    <main class="shell-content">
        <iframe id="page-frame" src="/command_studio" title="LXB internal page"></iframe>
    </main>
</div>
<div id="conn-panel-mask" class="conn-panel-mask"></div>
<aside id="conn-panel" class="conn-panel">
    <div class="conn-panel-head">
        <div style="font-size:14px; color:#93c5fd; font-weight:600;">连接管理</div>
        <button class="ghost-btn" id="conn-panel-close">关闭</button>
    </div>
    <div class="conn-panel-body">
        <div class="global-conn" style="flex-wrap: wrap;">
            <input id="global-host" value="192.168.1.100" placeholder="Host">
            <input id="global-port" class="port" type="number" value="12345" placeholder="Port">
            <button id="global-connect" class="primary">新建连接</button>
            <button id="global-refresh">刷新</button>
            <select id="global-conn-list"></select>
            <button id="global-disconnect">断开选中</button>
        </div>
        <div style="font-size:12px; color:#94a3b8;">提示: 选中连接后，内部页面会使用该连接执行命令和任务。</div>
    </div>
</aside>

<script>
(function () {
    const pageMap = {
        command_studio: { path: '/command_studio', title: 'Command Studio' },
        map_builder: { path: '/map_builder', title: 'Map Builder' },
        map_viewer: { path: '/map_viewer', title: 'Map Viewer' },
        cortex_route: { path: '/cortex_route', title: 'Cortex Route' }
    };

    const nav = document.getElementById('top-nav');
    const frame = document.getElementById('page-frame');
    const pageTitle = document.getElementById('page-title');
    const hostInput = document.getElementById('global-host');
    const portInput = document.getElementById('global-port');
    const connectBtn = document.getElementById('global-connect');
    const refreshBtn = document.getElementById('global-refresh');
    const connList = document.getElementById('global-conn-list');
    const disconnectBtn = document.getElementById('global-disconnect');
    const connStatus = document.getElementById('global-conn-status');
    const connPanel = document.getElementById('conn-panel');
    const connPanelMask = document.getElementById('conn-panel-mask');
    const connManageBtn = document.getElementById('global-conn-manage');
    const connPanelCloseBtn = document.getElementById('conn-panel-close');

    function openConnPanel() {
        connPanel.classList.add('show');
        connPanelMask.classList.add('show');
    }

    function closeConnPanel() {
        connPanel.classList.remove('show');
        connPanelMask.classList.remove('show');
    }

    async function jfetch(url, method = 'GET', body = null) {
        const opt = { method, headers: { 'Content-Type': 'application/json' } };
        if (body !== null) opt.body = JSON.stringify(body);
        const r = await fetch(url, opt);
        return await r.json();
    }

    async function refreshConnStatus() {
        try {
            const data = await jfetch('/api/status');
            const rows = data.connections || [];
            const currentId = data.connection_id || '';
            connList.innerHTML = '';
            if (!rows.length) {
                const empty = document.createElement('option');
                empty.value = '';
                empty.textContent = '无连接';
                connList.appendChild(empty);
                connList.value = '';
            } else {
                for (const c of rows) {
                    const opt = document.createElement('option');
                    opt.value = c.connection_id;
                    const running = Number(c.running_tasks || 0);
                    opt.textContent = `${c.host}:${c.port} | ${c.status} | tasks=${running}`;
                    connList.appendChild(opt);
                }
                if (currentId) connList.value = currentId;
            }
            const running = Number(data.running_tasks || 0);
            connStatus.textContent = `连接数 ${rows.length} | 运行中任务 ${running}` + (data.connected ? ` | 当前 ${data.host}:${data.port}` : '');
            connectBtn.disabled = false;
            disconnectBtn.disabled = !rows.length || !connList.value;
        } catch (_) {
            connStatus.textContent = '状态获取失败';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
        }
    }

    function setActive(key) {
        nav.querySelectorAll('button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.page === key);
        });
        pageTitle.textContent = pageMap[key]?.title || 'Command Studio';
    }

    function loadPage(key, updateHash = true) {
        if (!pageMap[key]) key = 'command_studio';
        const target = pageMap[key];
        setActive(key);
        if (frame.getAttribute('src') !== target.path) {
            frame.setAttribute('src', target.path);
        }
        if (updateHash) {
            const nextHash = '#' + key;
            if (window.location.hash !== nextHash) {
                window.location.hash = nextHash;
            }
        }
    }

    nav.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-page]');
        if (!btn) return;
        loadPage(btn.dataset.page, true);
    });

    connectBtn.addEventListener('click', async () => {
        const host = hostInput.value.trim() || '192.168.1.100';
        const port = Number(portInput.value || '12345');
        try {
            await jfetch('/api/connections/create', 'POST', { host, port, set_current: true, source: 'manual' });
        } catch (_) {}
        await refreshConnStatus();
    });

    refreshBtn.addEventListener('click', async () => {
        await refreshConnStatus();
    });

    connList.addEventListener('change', async () => {
        const connection_id = connList.value;
        if (!connection_id) return;
        try {
            await jfetch('/api/connections/select', 'POST', { connection_id });
        } catch (_) {}
        await refreshConnStatus();
    });

    disconnectBtn.addEventListener('click', async () => {
        const connection_id = connList.value;
        if (!connection_id) return;
        try {
            await jfetch(`/api/connections/${connection_id}/disconnect`, 'POST', {});
        } catch (_) {}
        await refreshConnStatus();
    });

    connManageBtn.addEventListener('click', openConnPanel);
    connPanelCloseBtn.addEventListener('click', closeConnPanel);
    connPanelMask.addEventListener('click', closeConnPanel);

    window.addEventListener('hashchange', () => {
        const key = (window.location.hash || '#command_studio').slice(1);
        loadPage(key, false);
    });

    const initial = (window.location.hash || '#command_studio').slice(1);
    loadPage(initial, false);
    refreshConnStatus();
    setInterval(refreshConnStatus, 2500);
})();
</script>
</body>
</html>
